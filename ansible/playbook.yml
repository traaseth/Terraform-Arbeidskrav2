---
- name: Configure web servers
  hosts: webservers
  become: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Apache
      apt:
        name: apache2
        state: present

    - name: Ensure Apache is running
      service:
        name: apache2
        state: started
        enabled: yes

    - name: Create custom index page
      copy:
        dest: /var/www/html/index.html
        content: |
          <html>
            <head><title>{{ server_name }}</title></head>
            <body>
              <h1>Dette er {{ server_name }}</h1>
            </body>
          </html>
        owner: root
        group: root
        mode: '0644'